<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sin's Business Hub</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Inter:wght@300;400;500;600&display=swap');

  :root {
    --bg: #0f1117;
    --surface: #171b25;
    --surface2: #1e2330;
    --border: #2a3040;
    --care-primary: #7a9e87;
    --care-accent: #c9a84c;
    --care-glow: rgba(122, 158, 135, 0.15);
    --edu-primary: #e07b5a;
    --edu-accent: #f5c842;
    --edu-glow: rgba(224, 123, 90, 0.15);
    --text: #e8eaf0;
    --text-dim: #7a8499;
    --text-muted: #4a5268;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', 'Noto Sans JP', sans-serif;
    min-height: 100vh;
    padding: 24px;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 32px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
  }
  .header-left h1 { font-size: 1.1rem; font-weight: 500; letter-spacing: 0.08em; color: var(--text-dim); text-transform: uppercase; }
  .header-left span { font-size: 0.75rem; color: var(--text-muted); }
  #clock { font-size: 0.95rem; font-weight: 500; color: var(--text-dim); font-variant-numeric: tabular-nums; letter-spacing: 0.05em; }

  .businesses { display: flex; flex-direction: column; gap: 28px; }

  .biz-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }

  .biz-header {
    display: flex; align-items: center; gap: 14px;
    padding: 18px 22px; cursor: pointer; user-select: none; transition: background 0.15s;
  }
  .biz-header:hover { background: var(--surface2); }
  .biz-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .biz-title { font-size: 1rem; font-weight: 600; flex: 1; }
  .biz-subtitle { font-size: 0.78rem; color: var(--text-muted); margin-top: 2px; }
  .biz-badge { font-size: 0.7rem; padding: 3px 10px; border-radius: 20px; font-weight: 500; letter-spacing: 0.04em; }
  .chevron { color: var(--text-muted); font-size: 0.8rem; transition: transform 0.2s; flex-shrink: 0; }
  .biz-card.open .chevron { transform: rotate(90deg); }
  .biz-body { display: none; padding: 0 22px 20px; border-top: 1px solid var(--border); }
  .biz-card.open .biz-body { display: block; }

  .cat-group { margin-top: 16px; }
  .cat-label { font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.12em; color: var(--text-muted); margin-bottom: 8px; font-weight: 500; }
  .links-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 8px; }

  /* ─── Link tile ─── */
  .link-tile {
    display: flex;
    flex-direction: column;
    gap: 0;
    padding: 10px 12px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    transition: border-color 0.15s, background 0.15s, transform 0.1s;
  }
  .link-tile:hover { background: #252c3d; transform: translateY(-1px); }

  .tile-top {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .tile-icon { font-size: 1.1rem; flex-shrink: 0; width: 22px; text-align: center; }
  .tile-text { flex: 1; min-width: 0; }
  .tile-name { font-size: 0.83rem; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .tile-desc { font-size: 0.7rem; color: var(--text-muted); margin-top: 1px; }

  /* ─── 表示/編集 ボタン行 ─── */
  .tile-actions {
    display: flex;
    gap: 6px;
    margin-top: 9px;
    padding-top: 8px;
    border-top: 1px solid var(--border);
  }
  .tile-btn {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
    padding: 4px 0;
    border-radius: 5px;
    font-size: 0.7rem;
    font-weight: 500;
    text-decoration: none;
    transition: background 0.12s, color 0.12s;
    cursor: pointer;
    border: none;
    font-family: inherit;
  }
  .tile-btn-view {
    background: rgba(122,158,135,0.12);
    color: var(--care-primary);
  }
  .tile-btn-view:hover { background: rgba(122,158,135,0.25); }
  .tile-btn-edit {
    background: rgba(201,168,76,0.12);
    color: var(--care-accent);
  }
  .tile-btn-edit:hover { background: rgba(201,168,76,0.25); }

  /* single URL tile (no dual buttons) — clickable whole tile */
  .link-tile-simple {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    text-decoration: none;
    color: var(--text);
    transition: border-color 0.15s, background 0.15s, transform 0.1s;
    cursor: pointer;
  }
  .link-tile-simple:hover { background: #252c3d; transform: translateY(-1px); }

  /* Quick note */
  .quick-note {
    margin-top: 14px; padding: 10px 14px;
    background: #171b25; border-left: 3px solid var(--border);
    border-radius: 0 6px 6px 0; font-size: 0.78rem; color: var(--text-muted); line-height: 1.6;
  }
  .quick-note strong { color: var(--text-dim); }

  /* Theming */
  .theme-care .biz-dot { background: var(--care-primary); box-shadow: 0 0 6px var(--care-primary); }
  .theme-care .biz-header:hover { background: var(--care-glow); }
  .theme-care .biz-badge { background: rgba(122,158,135,0.15); color: var(--care-primary); border: 1px solid rgba(122,158,135,0.3); }
  .theme-care .link-tile:hover, .theme-care .link-tile-simple:hover { border-color: var(--care-primary); }
  .theme-care .quick-note { border-left-color: var(--care-primary); }
  .theme-care .cat-label { color: rgba(122,158,135,0.6); }

  .theme-edu .biz-dot { background: var(--edu-primary); box-shadow: 0 0 6px var(--edu-primary); }
  .theme-edu .biz-header:hover { background: var(--edu-glow); }
  .theme-edu .biz-badge { background: rgba(224,123,90,0.12); color: var(--edu-primary); border: 1px solid rgba(224,123,90,0.3); }
  .theme-edu .link-tile:hover, .theme-edu .link-tile-simple:hover { border-color: var(--edu-primary); }
  .theme-edu .quick-note { border-left-color: var(--edu-primary); }
  .theme-edu .cat-label { color: rgba(224,123,90,0.6); }
  .theme-edu .tile-btn-view { background: rgba(224,123,90,0.12); color: var(--edu-primary); }
  .theme-edu .tile-btn-view:hover { background: rgba(224,123,90,0.25); }

  .theme-other .biz-dot { background: #5b6a8a; }
  .theme-other .biz-badge { background: rgba(91,106,138,0.15); color: #8899bb; border: 1px solid rgba(91,106,138,0.3); }
  .theme-other .link-tile:hover, .theme-other .link-tile-simple:hover { border-color: #5b6a8a; }
  .theme-other .tile-btn-view { background: rgba(91,106,138,0.15); color: #8899bb; }
  .theme-other .tile-btn-view:hover { background: rgba(91,106,138,0.28); }

  /* Edit mode */
  .edit-btn {
    background: none; border: 1px solid var(--border); color: var(--text-muted);
    padding: 5px 12px; border-radius: 6px; font-size: 0.72rem; cursor: pointer;
    transition: all 0.15s; letter-spacing: 0.04em;
  }
  .edit-btn:hover { border-color: var(--text-dim); color: var(--text); }

  .add-link-btn {
    display: flex; align-items: center; justify-content: center; gap: 6px;
    padding: 9px 12px; background: transparent; border: 1px dashed var(--border);
    border-radius: 8px; color: var(--text-muted); font-size: 0.78rem; cursor: pointer;
    transition: all 0.15s; width: 100%; margin-top: 8px; font-family: inherit;
  }
  .add-link-btn:hover { border-color: var(--text-dim); color: var(--text); background: var(--surface2); }

  .delete-badge {
    margin-left: auto; color: #e05a5a; font-size: 0.75rem; cursor: pointer;
    padding: 2px 6px; border-radius: 4px; flex-shrink: 0;
  }
  .delete-badge:hover { background: rgba(224,90,90,0.15); }

  /* Modal */
  .modal-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7);
    z-index: 100; align-items: center; justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 24px; width: 380px; max-width: 95vw;
    max-height: 90vh; overflow-y: auto;
  }
  .modal h3 { font-size: 0.95rem; margin-bottom: 16px; font-weight: 600; }
  .modal label { font-size: 0.75rem; color: var(--text-muted); display: block; margin-bottom: 4px; margin-top: 12px; }
  .modal input, .modal select {
    width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text);
    padding: 8px 10px; border-radius: 6px; font-size: 0.83rem; font-family: inherit;
    outline: none; transition: border-color 0.15s;
  }
  .modal input:focus, .modal select:focus { border-color: var(--care-primary); }
  .modal-hint { font-size: 0.7rem; color: var(--text-muted); margin-top: 4px; }
  .modal-section-title {
    font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.1em;
    color: var(--text-muted); margin-top: 18px; margin-bottom: 2px;
    padding-bottom: 6px; border-bottom: 1px solid var(--border);
  }
  .modal-actions { display: flex; gap: 8px; margin-top: 20px; justify-content: flex-end; }
  .btn-cancel {
    background: none; border: 1px solid var(--border); color: var(--text-muted);
    padding: 7px 16px; border-radius: 6px; cursor: pointer; font-size: 0.82rem; font-family: inherit;
  }
  .btn-save {
    background: var(--care-primary); border: none; color: #fff;
    padding: 7px 18px; border-radius: 6px; cursor: pointer; font-size: 0.82rem;
    font-weight: 600; font-family: inherit;
  }

  @media (max-width: 600px) {
    body { padding: 14px; }
    .links-grid { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>Business Hub</h1>
    <span>沖縄</span>
  </div>
  <div style="display:flex;gap:10px;align-items:center;">
    <div id="clock"></div>
    <button class="edit-btn" onclick="toggleEdit()">✎ 編集</button>
  </div>
</header>

<div class="businesses" id="bizContainer"></div>

<!-- Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h3>リンクを追加</h3>

    <label>名前</label>
    <input id="mName" placeholder="例: 利用規約ページ" />
    <label>説明（省略可）</label>
    <input id="mDesc" placeholder="例: GitHub Pages で公開中" />
    <label>アイコン（絵文字）</label>
    <input id="mIcon" placeholder="📄" maxlength="4" style="width:80px;" />
    <label>カテゴリ</label>
    <select id="mCat"></select>

    <div class="modal-section-title">🌐 表示URL（公開先）</div>
    <label>表示URL <span style="color:#e05a5a">*</span></label>
    <input id="mUrl" placeholder="https://carenaviokinawa8181-collab.github.io/terms.html" type="url" />
    <div class="modal-hint">ケアマネや施設が実際に見るURL</div>

    <div class="modal-section-title">✏️ 編集URL（GitHub など）</div>
    <label>編集URL（省略可）</label>
    <input id="mEditUrl" placeholder="https://github.com/.../edit/main/terms.html" type="url" />
    <div class="modal-hint">省略するとタイルをクリックで表示URLへ直接遷移</div>

    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">キャンセル</button>
      <button class="btn-save" onclick="saveLink()">追加</button>
    </div>
  </div>
</div>

<script>
const DEFAULT_DATA = {
  businesses: [
    {
      id: "carenavi",
      name: "ケアナビ沖縄",
      subtitle: "デイサービス × ケアマネ マッチングプラットフォーム",
      theme: "theme-care",
      badge: "稼働中",
      open: true,
      note: "📌 毎週金曜 → LINE提示リマインダー自動送信 | 月次 → 請求確認",
      categories: [
        {
          label: "管理・データ",
          links: [
            { name: "空き状況シート", desc: "メインデータ管理", icon: "📊", url: "https://docs.google.com/spreadsheets/" },
            { name: "施設マスター", desc: "登録施設一覧", icon: "🏥", url: "https://docs.google.com/spreadsheets/" },
            { name: "請求管理", desc: "月次サブスク確認", icon: "💴", url: "https://docs.google.com/spreadsheets/" }
          ]
        },
        {
          label: "公開ページ",
          links: [
            {
              name: "トップページ",
              desc: "carenaviokinawa8181",
              icon: "🌐",
              url: "https://carenaviokinawa8181-collab.github.io",
              editUrl: "https://github.com/carenaviokinawa8181-collab/carenaviokinawa8181-collab.github.io/edit/main/index.html"
            },
            {
              name: "利用規約",
              desc: "terms.html",
              icon: "📋",
              url: "https://carenaviokinawa8181-collab.github.io/terms.html",
              editUrl: "https://github.com/carenaviokinawa8181-collab/carenaviokinawa8181-collab.github.io/edit/main/terms.html"
            },
            {
              name: "プライバシーポリシー",
              desc: "privacy.html",
              icon: "🔒",
              url: "https://carenaviokinawa8181-collab.github.io/privacy.html",
              editUrl: "https://github.com/carenaviokinawa8181-collab/carenaviokinawa8181-collab.github.io/edit/main/privacy.html"
            },
            { name: "Google Analytics", desc: "G-HM2ZV5WPTP", icon: "📈", url: "https://analytics.google.com" }
          ]
        },
        {
          label: "自動化・開発",
          links: [
            { name: "GAS エディタ", desc: "Apps Script管理", icon: "⚙️", url: "https://script.google.com" },
            { name: "LINE Messaging API", desc: "公式アカウント設定", icon: "💬", url: "https://developers.line.biz" },
            { name: "Google My Maps", desc: "施設マップ", icon: "🗺️", url: "https://mymaps.google.com" }
          ]
        },
        {
          label: "営業・外回り",
          links: [
            { name: "訪問先リスト", desc: "那覇市146施設", icon: "📋", url: "https://docs.google.com/spreadsheets/" },
            { name: "4日間ルート", desc: "営業ルートマップ", icon: "🚗", url: "https://maps.google.com" },
            { name: "施設紹介PDF", desc: "A4フライヤー生成", icon: "📄", url: "https://script.google.com" }
          ]
        }
      ]
    },
    {
      id: "edu",
      name: "子供向け教育アプリ",
      subtitle: "楽しく学べるWebアプリ（恐竜など）",
      theme: "theme-edu",
      badge: "開発中",
      open: false,
      note: "📌 シンプルなHTML / JS で実装 | GitHub Pages でホスティング予定",
      categories: [
        {
          label: "開発",
          links: [
            {
              name: "恐竜アプリ",
              desc: "メインプロジェクト",
              icon: "🦕",
              url: "#",
              editUrl: "https://github.com"
            }
          ]
        }
      ]
    },
    {
      id: "general",
      name: "共通ツール",
      subtitle: "全事業で使うサービス",
      theme: "theme-other",
      badge: "共通",
      open: false,
      note: "",
      categories: [
        {
          label: "Google Workspace",
          links: [
            { name: "Gmail", desc: "メール", icon: "📧", url: "https://mail.google.com" },
            { name: "Google Drive", desc: "ファイル全般", icon: "💾", url: "https://drive.google.com" },
            { name: "Google カレンダー", desc: "スケジュール", icon: "📅", url: "https://calendar.google.com" },
            { name: "Google Docs", desc: "ドキュメント", icon: "📝", url: "https://docs.google.com" }
          ]
        }
      ]
    }
  ]
};

let data = JSON.parse(localStorage.getItem('biz_hub_v2') || 'null') || DEFAULT_DATA;
let editMode = false;
let pendingAdd = { bizId: null, catIndex: null };

function save() { localStorage.setItem('biz_hub_v2', JSON.stringify(data)); }

// ─── RENDER ─────────────────────────────────────────────
function renderTile(l, li, biz, ci) {
  const hasDual = l.editUrl && l.editUrl.length > 1;

  if (hasDual) {
    const deleteHtml = editMode
      ? `<span class="delete-badge" onclick="deleteLinkDual(event,'${biz.id}',${ci},${li})">✕</span>`
      : '';
    return `
      <div class="link-tile">
        <div class="tile-top">
          <span class="tile-icon">${l.icon || '🔗'}</span>
          <div class="tile-text">
            <div class="tile-name">${l.name}</div>
            ${l.desc ? `<div class="tile-desc">${l.desc}</div>` : ''}
          </div>
          ${deleteHtml}
        </div>
        <div class="tile-actions">
          <a class="tile-btn tile-btn-view" href="${l.url}" target="_blank" rel="noopener">🌐 表示</a>
          <a class="tile-btn tile-btn-edit" href="${l.editUrl}" target="_blank" rel="noopener">✏️ 編集</a>
        </div>
      </div>`;
  } else {
    const deleteAttr = editMode
      ? `onclick="return confirmDelete(event,'${biz.id}',${ci},${li})"`
      : '';
    return `
      <a class="link-tile-simple" href="${l.url}" target="_blank" rel="noopener" ${deleteAttr}>
        <span class="tile-icon">${l.icon || '🔗'}</span>
        <div class="tile-text">
          <div class="tile-name">${l.name}</div>
          ${l.desc ? `<div class="tile-desc">${l.desc}</div>` : ''}
        </div>
        ${editMode ? '<span style="margin-left:auto;color:#e05a5a;font-size:0.75rem;">✕</span>' : ''}
      </a>`;
  }
}

function render() {
  const container = document.getElementById('bizContainer');
  container.innerHTML = '';

  data.businesses.forEach(biz => {
    const card = document.createElement('div');
    card.className = `biz-card ${biz.theme} ${biz.open ? 'open' : ''}`;
    card.dataset.id = biz.id;

    const catsHtml = biz.categories.map((cat, ci) => `
      <div class="cat-group">
        <div class="cat-label">${cat.label}</div>
        <div class="links-grid">
          ${cat.links.map((l, li) => renderTile(l, li, biz, ci)).join('')}
          ${editMode ? `<button class="add-link-btn" onclick="openModal('${biz.id}',${ci})">＋ リンク追加</button>` : ''}
        </div>
      </div>
    `).join('');

    card.innerHTML = `
      <div class="biz-header" onclick="toggleCard('${biz.id}')">
        <span class="biz-dot"></span>
        <div>
          <div class="biz-title">${biz.name}</div>
          <div class="biz-subtitle">${biz.subtitle}</div>
        </div>
        <span class="biz-badge">${biz.badge}</span>
        <span class="chevron">▶</span>
      </div>
      <div class="biz-body">
        ${biz.note ? `<div class="quick-note">${biz.note}</div>` : ''}
        ${catsHtml}
      </div>
    `;
    container.appendChild(card);
  });
}

function toggleCard(id) {
  const biz = data.businesses.find(b => b.id === id);
  if (biz) { biz.open = !biz.open; save(); render(); }
}

function toggleEdit() {
  editMode = !editMode;
  document.querySelector('.edit-btn').textContent = editMode ? '✓ 完了' : '✎ 編集';
  render();
}

function confirmDelete(e, bizId, catIndex, linkIndex) {
  e.preventDefault();
  if (!confirm('このリンクを削除しますか？')) return false;
  data.businesses.find(b => b.id === bizId).categories[catIndex].links.splice(linkIndex, 1);
  save(); render(); return false;
}

function deleteLinkDual(e, bizId, catIndex, linkIndex) {
  e.stopPropagation();
  if (!confirm('このリンクを削除しますか？')) return;
  data.businesses.find(b => b.id === bizId).categories[catIndex].links.splice(linkIndex, 1);
  save(); render();
}

// ─── MODAL ──────────────────────────────────────────────
function openModal(bizId, catIndex) {
  pendingAdd = { bizId, catIndex };
  const biz = data.businesses.find(b => b.id === bizId);
  const catSel = document.getElementById('mCat');
  catSel.innerHTML = biz.categories.map((c, i) =>
    `<option value="${i}" ${i === catIndex ? 'selected' : ''}>${c.label}</option>`
  ).join('');
  ['mName','mUrl','mDesc','mEditUrl'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('mIcon').value = '🔗';
  document.getElementById('modal').classList.add('open');
}

function closeModal() { document.getElementById('modal').classList.remove('open'); }

function saveLink() {
  const name = document.getElementById('mName').value.trim();
  const url = document.getElementById('mUrl').value.trim();
  if (!name || !url) { alert('名前と表示URLを入力してください'); return; }
  const biz = data.businesses.find(b => b.id === pendingAdd.bizId);
  const ci = parseInt(document.getElementById('mCat').value);
  const editUrl = document.getElementById('mEditUrl').value.trim();
  const link = {
    name, url,
    desc: document.getElementById('mDesc').value.trim(),
    icon: document.getElementById('mIcon').value.trim() || '🔗'
  };
  if (editUrl) link.editUrl = editUrl;
  biz.categories[ci].links.push(link);
  save(); closeModal(); render();
}

document.getElementById('modal').addEventListener('click', e => {
  if (e.target === document.getElementById('modal')) closeModal();
});

// ─── CLOCK ──────────────────────────────────────────────
function updateClock() {
  const now = new Date();
  const d = now.toLocaleDateString('ja-JP', { month: 'short', day: 'numeric', weekday: 'short' });
  const t = now.toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit' });
  document.getElementById('clock').textContent = `${d}　${t}`;
}
updateClock();
setInterval(updateClock, 10000);

render();
</script>
</body>
</html>
